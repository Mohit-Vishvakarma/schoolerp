<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notice Board - Elite Academy</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">Elite Academy</div>
            <nav class="nav">
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="notice-board.html" class="active">Notice Board</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Notice Board Section -->
    <section class="section">
        <div class="container">
            <h2>Notice Board</h2>
            
            <!-- Notice Popup (shown on page load for demo) -->
            <div id="notice-popup" class="modal" style="display: flex;">
                <div class="modal-content">
                    <span class="close" onclick="closeNoticePopup()">&times;</span>
                    <h3>Important Notice</h3>
                    <p id="popup-notice-content">School will remain closed tomorrow due to maintenance. Regular classes will resume from day after tomorrow.</p>
                    <p><small>Date: <span id="popup-notice-date">April 5, 2026</span></small></p>
                </div>
            </div>

            <!-- Notices List -->
            <div id="notices-container">
                <!-- Notices will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="section" style="background: #333; color: white;">
        <div class="container">
            <div style="text-align: center;">
                <p>&copy; 2026 Elite Academy. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script type="module" src="../js/firebase-config.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/notice-board.js"></script>
</body>
</html>
