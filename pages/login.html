<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Login | Vidya Mandir School</title>
  <meta name="description" content="Login to Vidya Mandir School ERP Portal - Student, Teacher, and Admin access">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-page-body">
<div id="toastContainer" class="toast-container"></div>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">VM</div>
      <h2>Vidya Mandir School</h2>
      <p>ERP Portal Login</p>
    </div>
    <div class="login-tabs">
      <button type="button" class="login-tab active" data-role="student">🎓 Student</button>
      <button type="button" class="login-tab" data-role="teacher">👩‍🏫 Teacher</button>
      <button type="button" class="login-tab" data-role="admin">🛡️ Admin</button>
    </div>
    <div style="text-align:center;margin:10px 0;font-size:12px;color:#666">
      Currently selected: <span id="currentRoleDisplay" style="font-weight:bold;color:#2563eb">Student</span>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label id="loginIdLabel" class="form-label">Roll No / ID / Email</label>
        <input type="text" id="loginId" class="form-control" placeholder="Enter your ID or email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="loginPass" class="form-control" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Login →</button>
    </form>
    <div id="loginError" class="login-error"></div>
    <div style="margin-top:20px;padding:16px;background:var(--gray-100);border-radius:var(--radius);font-size:13px;color:var(--gray-600)">
      <strong>Demo Credentials:</strong><br>
      🎓 Student: Roll <code>101</code> or ID <code>STU001</code> / Pass <code>student123</code><br>
      👩‍🏫 Teacher: Email <code>sunita@vidyamandir.in</code> or ID <code>TCH001</code> / Pass <code>teacher123</code><br>
      🛡️ Admin: Email <code>admin@vidyamandir.in</code> or ID <code>admin</code> / Pass <code>admin123</code>
    </div>
    <div style="text-align:center;margin-top:16px">
      <a href="../index.html" style="font-size:14px;color:var(--gray-500)">← Back to Website</a>
    </div>
  </div>
</div>
<script type="module" src="../js/firebase-config.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
