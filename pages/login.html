<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SSVM portal login.">
  <title>Portal Login | Shri Saraswati Vidya Mandir</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-page-body">
  <main class="login-page">
    <section class="login-shell" aria-label="Portal login">
      <div class="login-spotlight" aria-hidden="true">
        <span class="login-orb login-orb-one"></span>
        <span class="login-orb login-orb-two"></span>
      </div>

      <div class="login-card">
        <div class="login-logo">
          <div class="logo-icon">SV</div>
          <h1>Portal Login</h1>
          <p>Students, teachers aur admin ke liye ek clean access screen.</p>
        </div>

        <div class="login-tabs" role="tablist" aria-label="Portal role selection">
          <button type="button" class="login-tab active" data-role="student">Student</button>
          <button type="button" class="login-tab" data-role="teacher">Teacher</button>
          <button type="button" class="login-tab" data-role="admin">Admin</button>
        </div>

        <p class="login-role-status">Selected role: <span id="currentRoleDisplay">Student</span></p>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label id="loginIdLabel" class="form-label" for="loginId">Roll No / Student ID / Email</label>
            <input type="text" id="loginId" class="form-control" placeholder="e.g. 101 or STU001" autocomplete="username" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="loginPass">Password</label>
            <input type="password" id="loginPass" class="form-control" autocomplete="current-password" required>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg">Login</button>
        </form>

        <div id="loginError" class="login-error" role="alert"></div>

        <div class="login-demo-box">
          <strong>Demo Credentials</strong>
          <p>Student: <code>101</code> / <code>student123</code></p>
          <p>Teacher: <code>TCH001</code> / <code>teacher123</code></p>
          <p>Admin: <code>admin</code> / <code>admin123</code></p>
        </div>
      </div>
    </section>
  </main>

  <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="../js/firebase-config.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
