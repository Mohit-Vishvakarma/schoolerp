<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Profile - Elite Academy</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">Elite Academy</div>
            <nav class="nav">
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="faculties.html">Faculties</a></li>
                    <li><a href="teacher-profile.html" class="active">Teacher Profile</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Teacher Profile Section -->
    <section class="section">
        <div class="container">
            <h2>Teacher Profile</h2>
            <div class="card" id="teacher-profile-card">
                <div style="text-align: center; margin-bottom: 30px;">
                    <i class="fas fa-user-circle fa-6x" style="color: #667eea;"></i>
                </div>
                <div style="text-align: center;">
                    <h3 id="teacher-name">Select a teacher from the Faculties page</h3>
                    <p id="teacher-position">Click on any teacher card to view their detailed profile</p>
                </div>
                <div style="text-align: center; margin-top: 30px;">
                    <a href="faculties.html" class="btn">View All Teachers</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="section" style="background: #333; color: white;">
        <div class="container">
            <div style="text-align: center;">
                <p>&copy; 2026 Elite Academy. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        // Check for teacher parameter in URL
        const urlParams = new URLSearchParams(window.location.search);
        const teacherId = urlParams.get('id');
        
        if (teacherId) {
            // Load teacher profile based on ID
            loadTeacherProfile(teacherId);
        }
        
        function loadTeacherProfile(teacherId) {
            const teachers = {
                'john-smith': {
                    name: 'Dr. John Smith',
                    position: 'Principal',
                    qualification: 'Ph.D. in Education',
                    experience: '20+ years',
                    subjects: 'Leadership & Administration',
                    bio: 'Dr. Smith has been leading Elite Academy since 2010. His visionary approach to education has transformed the school into a center of excellence.',
                    achievements: ['Best Principal Award 2025', 'Education Excellence Award']
                },
                'sarah-johnson': {
                    name: 'Ms. Sarah Johnson',
                    position: 'Mathematics Teacher',
                    qualification: 'M.Sc. Mathematics',
                    experience: '15 years',
                    subjects: 'Mathematics (Grades 9-12)',
                    bio: 'Ms. Johnson is passionate about making mathematics accessible to all students.',
                    achievements: ['Mathematics Teacher of the Year 2024', '100% pass rate']
                }
                // Add more teachers as needed
            };
            
            const teacher = teachers[teacherId];
            if (teacher) {
                document.getElementById('teacher-name').textContent = teacher.name;
                document.getElementById('teacher-position').textContent = teacher.position;
                
                const profileCard = document.getElementById('teacher-profile-card');
                profileCard.innerHTML = `
                    <div style="text-align: center; margin-bottom: 30px;">
                        <i class="fas fa-user-circle fa-6x" style="color: #667eea;"></i>
                    </div>
                    <h3>${teacher.name}</h3>
                    <p style="color: #667eea; font-weight: bold; font-size: 1.2em;">${teacher.position}</p>
                    <div style="margin: 20px 0;">
                        <p><strong>Qualification:</strong> ${teacher.qualification}</p>
                        <p><strong>Experience:</strong> ${teacher.experience}</p>
                        <p><strong>Subjects:</strong> ${teacher.subjects}</p>
                    </div>
                    <div style="margin: 20px 0;">
                        <h4>About</h4>
                        <p>${teacher.bio}</p>
                    </div>
                    <div style="margin: 20px 0;">
                        <h4>Achievements</h4>
                        <ul>
                            ${teacher.achievements.map(achievement => `<li>${achievement}</li>`).join('')}
                        </ul>
                    </div>
                    <div style="text-align: center; margin-top: 30px;">
                        <a href="faculties.html" class="btn">Back to Faculties</a>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
