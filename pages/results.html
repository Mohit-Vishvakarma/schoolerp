<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - Elite Academy</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">Elite Academy</div>
            <nav class="nav">
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="results.html" class="active">Results</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Results Section -->
    <section class="section">
        <div class="container">
            <h2>Check Your Results</h2>
            <div class="card" style="max-width: 600px; margin: 0 auto;">
                <form id="result-search-form">
                    <div class="form-group">
                        <label for="roll-number">Enter Roll Number</label>
                        <input type="text" id="roll-number" name="rollNumber" placeholder="e.g., 2026001" required>
                    </div>
                    <button type="submit" class="btn">Search Result</button>
                </form>
            </div>

            <div id="result-display" class="card" style="display: none; max-width: 800px; margin: 30px auto;">
                <h3 id="student-name">Student Name</h3>
                <p id="student-details">Class: X | Roll Number: 2026001</p>
                
                <table class="table">
                    <thead>
                        <tr>
                            <th>Subject</th>
                            <th>Marks Obtained</th>
                            <th>Total Marks</th>
                            <th>Grade</th>
                        </tr>
                    </thead>
                    <tbody id="marks-table">
                        <!-- Marks will be populated here -->
                    </tbody>
                </table>
                
                <div style="text-align: center; margin-top: 20px;">
                    <p><strong>Total Marks: <span id="total-marks"></span></strong></p>
                    <p><strong>Percentage: <span id="percentage"></span>%</strong></p>
                    <p><strong>Grade: <span id="overall-grade"></span></strong></p>
                    <button class="btn" onclick="downloadResult()">Download Result</button>
                    <button class="btn" onclick="printResult()">Print Result</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="section" style="background: #333; color: white;">
        <div class="container">
            <div style="text-align: center;">
                <p>&copy; 2026 Elite Academy. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script type="module" src="../js/firebase-config.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/results.js"></script>
</body>
</html>
